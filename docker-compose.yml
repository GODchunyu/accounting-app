services:
  postgres:
    image: postgres:16-alpine
    container_name: accounting-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-accounting}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-accounting_dev_password}
      POSTGRES_DB: ${POSTGRES_DB:-accounting_app}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test:
        ["CMD-SHELL", 'pg_isready -U "$${POSTGRES_USER}" -d "$${POSTGRES_DB}"']
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    container_name: accounting-api
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      NODE_ENV: ${NODE_ENV:-development}
      PORT: 3000
      DATABASE_URL: postgresql://${POSTGRES_USER:-accounting}:${POSTGRES_PASSWORD:-accounting_dev_password}@postgres:5432/${POSTGRES_DB:-accounting_app}?schema=public
      JWT_SECRET: ${JWT_SECRET:-change_me_to_a_very_long_secret_with_at_least_32_chars}
      UPLOAD_DIR: ${UPLOAD_DIR:-uploads}
    ports:
      - "${API_PORT:-3000}:3000"
    volumes:
      - uploads_data:/app/apps/api/uploads
    healthcheck:
      test:
        [
          "CMD-SHELL",
          'node -e "fetch(''http://127.0.0.1:3000/api/health'').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"',
        ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

volumes:
  postgres_data:
  uploads_data:
